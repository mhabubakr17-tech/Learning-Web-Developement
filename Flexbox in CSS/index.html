<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        .order-1{
            order: 1;
        }
        .order-3{
            order: 3;
        }
        .box1{
            flex-grow: 9;
            align-self: flex-start;
        }
        .box{
            /* flex-grow: 2; */
            display: flex;
            border: 2px solid red;
            flex-direction: row;
            height: 80vh;
            justify-content: flex-end;
            align-items: flex-end;
            align-content: flex-end;
            flex-flow: row wrap;
            gap: 10px 10px;

        }
        .boxes{
            background-color: blueviolet;
            width: 50px;
            height: 50px;
            margin: 2px;
            border: 2px solid black;
        }

    </style>
</head>
<body>
    <div class="box">
        
        
        <div class="boxes box1">1</div>
        <div class="boxes"></div>
        <div class="boxes"></div>
        <div class="boxes"></div>
        <div class="boxes"></div>
        <div class="boxes"></div>
        <div class="boxes"></div>
        <div class="boxes"></div>
        <div class="boxes"></div>
        <div class="boxes order-1">666</div>
        <div class="boxes order-3">999</div>
        <div class="boxes">333</div>
        
        <div class="boxes"></div>
        <div class="boxes"></div>
    </div>






</body>
</html]
