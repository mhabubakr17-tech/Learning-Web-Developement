<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid{
            border: 1px solid red;
            display: grid;
            grid-template-columns: 120px 100px;
            grid-template-rows: 100px 100px 100px;
        }
        .box{
            border: 2px solid black;
            box-sizing: border-box;
            margin: 5px;
            padding: 20px;
            /* width: 50px; */
            /* height: 50px; */
            background-color: aqua;
        }

        .box-4{
            grid-row: 4/5;
            grid-column: 3/1;
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box box-4">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
    </div>





</body>
</html>
